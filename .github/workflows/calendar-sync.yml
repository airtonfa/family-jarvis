name: Calendar Mirror Sync (hourly)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  calendar-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run calendar mirror sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: npm run calendar-sync
